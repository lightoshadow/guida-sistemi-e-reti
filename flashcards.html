<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — Sistemi e Reti</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d2e;
    --bg3: #242740;
    --border: #2e3250;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #34d399;
    --orange: #f59e0b;
    --red: #f87171;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar a {
    color: var(--text3);
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color .15s;
  }
  .topbar a:hover { color: var(--accent); }

  .topbar-title {
    font-size: 15px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .topbar-sep { color: var(--border); font-size: 18px; }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .kbd-hint { font-size: 11px; color: var(--text3); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .kbd { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: var(--mono); color: var(--text2); }

  /* ── CONTROLS ── */
  .controls {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .controls select, .controls button {
    font-family: var(--font);
    font-size: 13px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    padding: 7px 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .controls select:focus, .controls button:hover { border-color: var(--accent); outline: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2)) !important;
    border-color: transparent !important;
    color: #fff !important;
    font-weight: 600;
  }
  .btn-primary:hover { opacity: .9; }

  .controls-sep { flex: 1; }

  .stat-pill {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
  }
  .stat-known { background: rgba(52,211,153,.15); color: var(--green); border: 1px solid rgba(52,211,153,.3); }
  .stat-remaining { background: rgba(79,142,247,.15); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }

  /* ── PROGRESS BAR ── */
  .prog-wrap {
    padding: 0 24px;
    background: var(--bg);
    padding-bottom: 8px;
    padding-top: 8px;
  }

  .prog-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
  }

  .prog-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    text-align: right;
  }

  /* ── MAIN AREA ── */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    min-height: calc(100vh - 140px);
  }

  /* ── CARD ── */
  .card-wrap {
    width: 100%;
    max-width: 680px;
    perspective: 1200px;
    margin-bottom: 28px;
  }

  .card {
    width: 100%;
    min-height: 300px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 36px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
  }

  .card-back {
    background: linear-gradient(135deg, #1a2035 0%, #1e2540 100%);
    transform: rotateY(180deg);
    border-color: rgba(79,142,247,.3);
  }

  .card-tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .7px;
    color: var(--text3);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-tag .tag-topic {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--accent);
  }

  .card-q {
    font-size: clamp(17px, 2.5vw, 22px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
    display: flex;
    align-items: center;
  }

  .card-hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .7px;
    color: var(--green);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-a {
    font-size: clamp(14px, 2vw, 16px);
    color: var(--text);
    line-height: 1.7;
    flex: 1;
  }

  .card-a code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg3);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--orange);
  }

  .card-a strong { color: var(--accent); }

  /* ── NAV BUTTONS ── */
  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
  }

  .nav-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: border-color .15s, background .15s, transform .1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--bg3); }
  .nav-btn:active:not(:disabled) { transform: scale(.97); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

  .btn-know {
    background: rgba(52,211,153,.1) !important;
    border-color: rgba(52,211,153,.4) !important;
    color: var(--green) !important;
  }
  .btn-know:hover:not(:disabled) { background: rgba(52,211,153,.2) !important; }

  .card-counter {
    font-size: 14px;
    color: var(--text2);
    font-weight: 600;
    min-width: 60px;
    text-align: center;
  }

  /* ── DONE STATE ── */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .done-screen.visible { display: flex; }

  .done-icon { font-size: 56px; }

  .done-title {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--green), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .done-sub { font-size: 14px; color: var(--text2); }

  .done-stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .done-stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 100px;
  }

  .done-stat .ds-val { font-size: 28px; font-weight: 800; color: var(--accent); }
  .done-stat .ds-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .controls { padding: 12px 16px; }
    .main { padding: 24px 12px 40px; }
    .card-face { padding: 22px 20px; }
    .topbar { padding: 12px 16px; }
    .kbd-hint { display: none; }
    .prog-wrap { padding: 6px 16px; }
  }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a href="index.html">← Guida</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-title">Flashcards — Sistemi e Reti</span>
  <div class="topbar-right">
    <div class="kbd-hint">
      <span><span class="kbd">Spazio</span> gira</span>
      <span><span class="kbd">←</span><span class="kbd">→</span> naviga</span>
      <span><span class="kbd">S</span> mescola</span>
      <span><span class="kbd">K</span> già so</span>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <select id="topic-filter" aria-label="Filtra per argomento">
    <option value="all">Tutti gli argomenti</option>
    <option value="Architettura di rete">1. Architettura di rete</option>
    <option value="Indirizzamento IP">2. Indirizzamento IP</option>
    <option value="LAN & VLAN">3. LAN & VLAN</option>
    <option value="Wi-Fi">4. Wi-Fi</option>
    <option value="Routing & Switching">5. Routing & Switching</option>
    <option value="Sicurezza">6. Sicurezza</option>
    <option value="Protocolli & Servizi">7. Protocolli & Servizi</option>
    <option value="VPN">8. VPN</option>
    <option value="Server & Infrastruttura">9. Server & Infrastruttura</option>
    <option value="Cloud & Virtualizzazione">10. Cloud & Virtualizzazione</option>
    <option value="IoT">11. IoT</option>
    <option value="Socket">12. Socket</option>
    <option value="Fibra & Radio">13. Fibra & Radio</option>
    <option value="Privacy & GDPR">14. Privacy & GDPR</option>
  </select>
  <button id="btn-shuffle">🔀 Mescola</button>
  <button id="btn-reset">↺ Ricomincia</button>
  <button id="btn-only-unknown">🎯 Solo da ripassare</button>
  <span class="controls-sep"></span>
  <span class="stat-pill stat-known" id="stat-known">✓ 0 già so</span>
  <span class="stat-pill stat-remaining" id="stat-remaining">0 rimanenti</span>
</div>

<!-- Progress -->
<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-label" id="prog-label">0 / 0</div>
</div>

<!-- Main -->
<div class="main" id="main">

  <!-- Card -->
  <div class="card-wrap" id="card-wrap">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front" id="card-front">
        <div class="card-tag">
          <span>Domanda</span>
          <span class="tag-topic" id="card-topic-tag"></span>
        </div>
        <div class="card-q" id="card-q"></div>
        <div class="card-hint">Clicca per vedere la risposta · <span class="kbd">Spazio</span></div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">✓ Risposta</div>
        <div class="card-a" id="card-a"></div>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="prev()">← Indietro</button>
    <span class="card-counter" id="card-counter">1 / 1</span>
    <button class="nav-btn" id="btn-next" onclick="next()">Avanti →</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn btn-know" id="btn-know" onclick="markKnown()">✓ Già so</button>
  </div>

  <!-- Done screen -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">🎉</div>
    <div class="done-title">Hai finito il mazzo!</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-stats" id="done-stats"></div>
    <button class="nav-btn btn-primary" onclick="resetDeck()" style="margin-top:8px">↺ Ricomincia tutto</button>
  </div>

</div>

<script>
// ── DATA ──
const cards = [
  // ── 1. ARCHITETTURA DI RETE ──
  { t:"Architettura di rete", q:"Cos'è una DMZ?", a:"Zona demilitarizzata: segmento di rete <strong>separato dalla rete interna e da internet</strong> tramite firewall, usato per ospitare server pubblici (web, mail, DNS). Il traffico esterno arriva alla DMZ ma non entra nella LAN." },
  { t:"Architettura di rete", q:"Differenza tra schema logico e schema fisico di una rete?", a:"<strong>Schema fisico</strong>: rappresenta la disposizione reale dei dispositivi, i cavi e i connettori nello spazio.<br><strong>Schema logico</strong>: mostra le connessioni IP, VLAN, subnet e flussi di routing, indipendentemente dalla posizione fisica." },
  { t:"Architettura di rete", q:"Cos'è il cablaggio strutturato (EIA/TIA-568)?", a:"Sistema standardizzato organizzato in:<br>• <strong>Distribuzione orizzontale</strong>: rame CAT5e/6/6A dai pannelli ai posti lavoro (max 90 m)<br>• <strong>Distribuzione verticale (backbone)</strong>: fibra tra piani/edifici<br>• <strong>Centri stella di piano</strong>, patch panel, armadi rack." },
  { t:"Architettura di rete", q:"Cos'è la fault tolerance in una rete?", a:"La capacità di un sistema di <strong>continuare a funzionare correttamente anche in caso di guasto</strong> di uno o più componenti. Si realizza tramite ridondanza: doppi link, switch ridondanti, alimentatori UPS, server in cluster." },
  { t:"Architettura di rete", q:"Cos'è la business continuity?", a:"L'insieme di misure (ridondanza, backup, failover, piano di ripristino) per <strong>garantire la continuità operativa</strong> aziendale anche in caso di disastri o guasti gravi. Include RTO (Recovery Time Objective) e RPO (Recovery Point Objective)." },
  { t:"Architettura di rete", q:"Cos'è un'architettura multi-sede? Come si collegano le sedi?", a:"Una rete aziendale distribuita su più edifici o città. Le sedi si collegano tramite:<br>• <strong>VPN site-to-site</strong> (su internet, cifrata)<br>• <strong>MPLS</strong> (linea privata del provider)<br>• <strong>Fibra dedicata o radio</strong> (per campus vicini)" },
  { t:"Architettura di rete", q:"Quali sono i livelli del cablaggio strutturato?", a:"• <strong>TO (Telecommunications Outlet)</strong>: presa a muro<br>• <strong>FD (Floor Distributor)</strong>: centro stella di piano, armadio di piano<br>• <strong>BD (Building Distributor)</strong>: centro stella edificio<br>• <strong>CD (Campus Distributor)</strong>: centro stella campus" },
  { t:"Architettura di rete", q:"Che cos'è una topologia a stella e quali vantaggi ha?", a:"Tutti i nodi sono collegati a un nodo centrale (switch/hub). <strong>Vantaggi</strong>: isolamento dei guasti (un link rotto non abbatte la rete), facile gestione, scalabilità. <strong>Svantaggio</strong>: single point of failure nel nodo centrale." },
  { t:"Architettura di rete", q:"Cos'è la connettività FTTC vs FTTH?", a:"<strong>FTTC</strong> (Fiber To The Cabinet): fibra fino all'armadio stradale, poi rame fino all'utente. Velocità tipica: 100–300 Mbps.<br><strong>FTTH</strong> (Fiber To The Home): fibra fino all'abitazione/ufficio. Velocità: fino a 1 Gbps e oltre." },

  // ── 2. INDIRIZZAMENTO IP ──
  { t:"Indirizzamento IP", q:"Cosa indica la notazione CIDR /24?", a:"Una subnet mask di <code>255.255.255.0</code>: 24 bit dedicati alla rete, 8 bit agli host. Permette <strong>2⁸ − 2 = 254 host utilizzabili</strong>. Indirizzo di broadcast: il byte finale è 255." },
  { t:"Indirizzamento IP", q:"Quanti host utilizzabili ci sono in una rete /26?", a:"8 bit di host con /32 − /26 = 6 bit liberi. <strong>2⁶ − 2 = 62 host</strong> utilizzabili (si sottraggono indirizzo di rete e broadcast)." },
  { t:"Indirizzamento IP", q:"Qual è il range degli indirizzi privati RFC 1918?", a:"• <code>10.0.0.0 / 8</code> (classe A — 16 M indirizzi)<br>• <code>172.16.0.0 / 12</code> (classe B — 1 M indirizzi)<br>• <code>192.168.0.0 / 16</code> (classe C — 65 K indirizzi)" },
  { t:"Indirizzamento IP", q:"Cos'è il VLSM?", a:"<strong>Variable Length Subnet Masking</strong>: tecnica per assegnare maschere di lunghezza variabile in base al numero di host richiesto da ciascuna sottorete. Evita sprechi di indirizzi rispetto al subnetting a lunghezza fissa." },
  { t:"Indirizzamento IP", q:"Cos'è il NAT/PAT?", a:"<strong>NAT</strong> (Network Address Translation): traduce un IP privato in un IP pubblico.<br><strong>PAT</strong> (Port Address Translation / NAT overload): molti IP privati condividono un unico IP pubblico, differenziati dalla porta TCP/UDP sorgente." },
  { t:"Indirizzamento IP", q:"Descrivi la sequenza DORA del DHCP.", a:"<strong>D</strong>iscover → client broadcast cerca un server DHCP<br><strong>O</strong>ffer → server propone un IP disponibile<br><strong>R</strong>equest → client accetta l'offerta (broadcast)<br><strong>A</strong>cknowledge → server conferma l'assegnazione" },
  { t:"Indirizzamento IP", q:"Qual è l'indirizzo di broadcast di 192.168.1.0/24?", a:"<strong>192.168.1.255</strong>. I 24 bit di rete sono fissi, gli 8 bit di host vengono posti tutti a 1." },
  { t:"Indirizzamento IP", q:"Quante sottoreti posso ottenere da una /24 suddividendola in /27?", a:"Bit sottreti agli host: /27 − /24 = 3 bit. Numero sottoreti: <strong>2³ = 8 sottoreti</strong>, ognuna con 2⁵ − 2 = 30 host utilizzabili." },
  { t:"Indirizzamento IP", q:"Cos'è il piano di indirizzamento e cosa deve contenere?", a:"Tabella che assegna sistematicamente gli indirizzi IP a tutta la rete. Colonne tipiche: rete, subnet mask, gateway, primo host, ultimo host, broadcast, numero host, utilizzo." },
  { t:"Indirizzamento IP", q:"Cos'è il port forwarding?", a:"Regola sul router/firewall che reindirizza il traffico in arrivo su una porta pubblica verso un host interno specifico. Es.: traffico su porta 443 pubblica → server web interno 192.168.1.10:443." },
  { t:"Indirizzamento IP", q:"Quanti host utilizzabili ha una rete /29?", a:"32 − 29 = 3 bit di host. <strong>2³ − 2 = 6 host</strong> utilizzabili. Subnet mask: 255.255.255.248." },

  // ── 3. LAN & VLAN ──
  { t:"LAN & VLAN", q:"Differenza tra porta access e porta trunk su uno switch 802.1Q?", a:"<strong>Porta access</strong>: appartiene a una sola VLAN; non aggiunge tag 802.1Q; connette host finali.<br><strong>Porta trunk</strong>: trasporta traffico di più VLAN aggiungendo il tag 802.1Q; connette switch tra loro o switch–router." },
  { t:"LAN & VLAN", q:"Cos'è lo Spanning Tree Protocol (STP)?", a:"Protocollo IEEE 802.1D che <strong>previene i loop layer-2</strong> bloccando le porte ridondanti. Elegge un root bridge, calcola i percorsi migliori, pone le porte ridondanti in stato blocking. RSTP (802.1w) è la versione rapida." },
  { t:"LAN & VLAN", q:"Cos'è l'inter-VLAN routing?", a:"Instradamento del traffico <strong>tra VLAN diverse</strong>. Realizzabile con:<br>• <strong>Router-on-a-stick</strong>: router esterno con sotto-interfacce taggiate<br>• <strong>Switch L3</strong> (multilayer switch): instrada internamente, più performante" },
  { t:"LAN & VLAN", q:"Differenza tra collision domain e broadcast domain?", a:"<strong>Collision domain</strong>: segmento dove più host possono collidere sul mezzo (limitato da switch/bridge per ogni porta).<br><strong>Broadcast domain</strong>: segmento dove arriva un broadcast L2 (limitato da router o da VLAN)." },
  { t:"LAN & VLAN", q:"Perché si usano le VLAN?", a:"Separazione logica del traffico senza cablaggio fisico separato. Vantaggi: <strong>sicurezza</strong> (isolamento), <strong>performance</strong> (broadcast contenuti), <strong>flessibilità</strong> (riconfigurazione software), <strong>risparmio</strong> (meno hardware)." },
  { t:"LAN & VLAN", q:"Cos'è il link aggregation (LACP)?", a:"IEEE 802.3ad: raggruppa più link fisici in un unico link logico. Benefici: <strong>banda aggregata</strong> (2×, 4× il link singolo) e <strong>ridondanza</strong> (se un link cade, gli altri continuano a funzionare)." },
  { t:"LAN & VLAN", q:"Differenza tra switch amministrabile e non amministrabile?", a:"<strong>Non amministrabile</strong>: plug-and-play, nessuna configurazione, nessuna VLAN, solo forwarding L2 base.<br><strong>Amministrabile</strong>: supporta VLAN, STP, port mirroring, SNMP, QoS, SSH management — necessario in reti professionali." },

  // ── 4. WI-FI ──
  { t:"Wi-Fi", q:"Quali standard IEEE 802.11 devi conoscere per l'esame?", a:"<table style='font-size:13px;line-height:1.8'><tr><td><strong>802.11b</strong></td><td>11 Mbps, 2.4 GHz</td></tr><tr><td><strong>802.11g</strong></td><td>54 Mbps, 2.4 GHz</td></tr><tr><td><strong>802.11n</strong></td><td>300+ Mbps, 2.4/5 GHz</td></tr><tr><td><strong>802.11ac (Wi-Fi 5)</strong></td><td>Gbps, 5 GHz</td></tr><tr><td><strong>802.11ax (Wi-Fi 6)</strong></td><td>Gbps, 2.4/5/6 GHz</td></tr></table>" },
  { t:"Wi-Fi", q:"Perché WEP è considerato insicuro?", a:"Usa RC4 con <strong>IV (Initialization Vector) di soli 24 bit</strong>, che si ripete rapidamente. La chiave è statica e condivisa. Con strumenti come Aircrack-ng si cracca in pochi minuti catturando ~5000 pacchetti." },
  { t:"Wi-Fi", q:"Differenza tra WPA2-Personal e WPA2-Enterprise?", a:"<strong>Personal (PSK)</strong>: chiave pre-condivisa uguale per tutti i client — semplice ma meno sicuro (se la chiave viene compromessa, l'intera rete è compromessa).<br><strong>Enterprise (802.1X)</strong>: autenticazione RADIUS con credenziali individuali per ogni utente." },
  { t:"Wi-Fi", q:"Canali non sovrapposti a 2.4 GHz?", a:"Tre canali non sovrapposti: <strong>1, 6, 11</strong>. In Europa è disponibile anche il canale 13. Deployare AP adiacenti su canali sovrapposti causa co-channel interference e degrada le prestazioni." },
  { t:"Wi-Fi", q:"Cos'è il CSMA/CA?", a:"<strong>Carrier Sense Multiple Access with Collision Avoidance</strong>: meccanismo wireless che <em>previene</em> (non rileva) le collisioni. Prima di trasmettere, il nodo verifica che il canale sia libero e aspetta un backoff casuale. Usa RTS/CTS per nodi nascosti." },
  { t:"Wi-Fi", q:"Vantaggi della banda 5 GHz rispetto a 2.4 GHz?", a:"<strong>5 GHz</strong>: meno interferenze (meno dispositivi), più canali non sovrapposti (23 a 80 MHz), velocità più alta.<br><strong>Svantaggio</strong>: portata minore e minore penetrazione dei muri rispetto a 2.4 GHz." },

  // ── 5. ROUTING & SWITCHING ──
  { t:"Routing & Switching", q:"Differenza tra routing statico e dinamico?", a:"<strong>Statico</strong>: configurato manualmente, stabile, nessun overhead, non si adatta ai guasti. Adatto a reti piccole o con topologia fissa.<br><strong>Dinamico</strong>: i router si scambiano automaticamente le informazioni di routing (RIP, OSPF). Scalabile, si adatta ai cambiamenti." },
  { t:"Routing & Switching", q:"Cos'è OSPF?", a:"<strong>Open Shortest Path First</strong>: protocollo IGP link-state. Ogni router conosce la topologia completa dell'area. Usa l'algoritmo di Dijkstra (SPF) per trovare il percorso più breve. Metrica: costo (basato sulla banda). Organizzato in aree per scalabilità." },
  { t:"Routing & Switching", q:"Cos'è RIP e quali sono i suoi limiti?", a:"<strong>Routing Information Protocol</strong>: protocollo distance-vector semplice. Metrica: numero di hop (max 15). Limiti: <strong>max 15 hop</strong> (reti piccole), convergenza lenta, non supporta VLSM nelle versioni base (RIPv1)." },
  { t:"Routing & Switching", q:"Come si legge una tabella di routing?", a:"Ogni riga ha: <strong>destinazione</strong> (rete + maschera), <strong>next-hop</strong> (IP del router successivo), <strong>interfaccia di uscita</strong>, <strong>metrica</strong>. La default route (0.0.0.0/0) cattura tutto il traffico non altrimenti instradato." },
  { t:"Routing & Switching", q:"Cos'è il default gateway?", a:"L'indirizzo IP del router cui un host invia tutti i pacchetti destinati a reti non direttamente connesse. Configurato staticamente o tramite DHCP (opzione 3)." },
  { t:"Routing & Switching", q:"Differenza tra router e switch layer 2?", a:"<strong>Switch L2</strong>: opera a livello 2 (MAC address), forwarding frame nella stessa rete, non instrada IP.<br><strong>Router</strong>: opera a livello 3 (IP), instrada pacchetti tra reti diverse, separa i broadcast domain." },

  // ── 6. SICUREZZA ──
  { t:"Sicurezza", q:"Differenza tra firewall packet filter, stateful inspection e NGFW?", a:"<strong>Packet filter</strong>: controlla solo header IP/TCP (src/dst IP, porta, protocollo), senza stato.<br><strong>Stateful</strong>: tiene traccia delle connessioni attive, più sicuro.<br><strong>NGFW</strong>: Deep Packet Inspection, IDS/IPS integrato, controllo applicativo, filtro contenuti." },
  { t:"Sicurezza", q:"Cos'è un IDS? Differenza con IPS?", a:"<strong>IDS</strong> (Intrusion Detection System): <em>rileva</em> intrusioni e avvisa l'amministratore, ma non blocca.<br><strong>IPS</strong> (Intrusion Prevention System): <em>rileva e blocca</em> automaticamente le intrusioni in tempo reale (inline nel traffico)." },
  { t:"Sicurezza", q:"Cos'è un attacco Man-in-the-Middle (MitM)?", a:"L'attaccante si interpone nella comunicazione tra due host, intercettando o modificando i dati. Tecniche comuni: <strong>ARP poisoning</strong> (avvelena la cache ARP), <strong>DNS spoofing</strong>, <strong>rogue AP</strong>. Difesa: TLS/HTTPS, certificate pinning." },
  { t:"Sicurezza", q:"Differenza tra crittografia simmetrica e asimmetrica?", a:"<strong>Simmetrica</strong>: stessa chiave per cifrare e decifrare. Veloce, ma problema di distribuzione sicura della chiave. Esempi: AES, 3DES.<br><strong>Asimmetrica</strong>: coppia chiave pubblica/privata. Più lenta, risolve il problema della distribuzione. Esempi: RSA, ECC." },
  { t:"Sicurezza", q:"Cos'è la firma digitale?", a:"Meccanismo crittografico che garantisce <strong>autenticità e integrità</strong>. Funzionamento: mittente calcola l'hash del documento e lo cifra con la propria <strong>chiave privata</strong>. Il destinatario decifra con la chiave pubblica e confronta gli hash." },
  { t:"Sicurezza", q:"Cos'è l'autenticazione a più fattori (MFA)?", a:"Richiede almeno due fattori tra:<br>• <strong>Qualcosa che sai</strong>: password, PIN<br>• <strong>Qualcosa che hai</strong>: OTP (TOTP), token hardware, smartphone<br>• <strong>Qualcosa che sei</strong>: biometria (impronta, volto)" },
  { t:"Sicurezza", q:"Cos'è un attacco DDoS?", a:"<strong>Distributed Denial of Service</strong>: saturare le risorse di un server o rete con traffico massiccio proveniente da molti host (botnet), rendendolo irraggiungibile per gli utenti legittimi." },
  { t:"Sicurezza", q:"Cos'è l'ACL in ambito firewall/router?", a:"<strong>Access Control List</strong>: lista di regole che permettono o negano il traffico in base a criteri (IP sorgente/destinazione, porta, protocollo). Applicate in ingresso o uscita sulle interfacce del router/firewall." },
  { t:"Sicurezza", q:"Cos'è lo sniffing di rete?", a:"Intercettazione del traffico di rete tramite strumenti come Wireshark. Possibile su reti hub (broadcast del traffico) o tramite ARP poisoning su reti switched. Difesa: cifratura (TLS, VPN), switch con port security." },

  // ── 7. PROTOCOLLI & SERVIZI ──
  { t:"Protocolli & Servizi", q:"Su quali porte operano HTTP e HTTPS?", a:"<strong>HTTP</strong>: porta 80 (TCP)<br><strong>HTTPS</strong>: porta 443 (TCP)" },
  { t:"Protocolli & Servizi", q:"Differenza tra POP3 e IMAP?", a:"<strong>POP3</strong> (porta 110/995 SSL): scarica le email sul client e (di default) le elimina dal server. Un solo dispositivo.<br><strong>IMAP</strong> (porta 143/993 SSL): mantiene le email sul server, sincronizzate su più dispositivi." },
  { t:"Protocolli & Servizi", q:"Come funziona il DNS?", a:"Gerarchia di server: <strong>Root nameserver</strong> → <strong>TLD nameserver</strong> (.it, .com) → <strong>Authoritative nameserver</strong>.<br>Record principali: A (IPv4), AAAA (IPv6), MX (mail), CNAME (alias), PTR (reverse lookup), NS (nameserver)." },
  { t:"Protocolli & Servizi", q:"Differenza tra TCP e UDP?", a:"<strong>TCP</strong>: connesso, affidabile, controllo di flusso/errori/congestione, handshake a 3 vie, ordinamento pacchetti. Usato per HTTP, FTP, SMTP.<br><strong>UDP</strong>: non connesso, non affidabile, leggero, veloce. Usato per DNS, DHCP, VoIP, streaming." },
  { t:"Protocolli & Servizi", q:"Cos'è un proxy server?", a:"Server intermediario tra client e internet. Funzioni: <strong>caching</strong> (riduce banda), <strong>filtraggio URL</strong> (content filtering), <strong>autenticazione</strong> utenti, <strong>anonimizzazione</strong> IP. Proxy trasparente: non richiede configurazione client." },
  { t:"Protocolli & Servizi", q:"Cos'è SNMP?", a:"<strong>Simple Network Management Protocol</strong>: protocollo per monitoraggio e gestione dispositivi di rete. Componenti: <strong>manager</strong> (NMS), <strong>agent</strong> (sul dispositivo), <strong>MIB</strong> (database oggetti gestibili). SNMPv3 aggiunge cifratura e autenticazione." },
  { t:"Protocolli & Servizi", q:"Cos'è SMTP e su quale porta opera?", a:"<strong>Simple Mail Transfer Protocol</strong>: protocollo per l'invio di email tra server mail. Porta <strong>25</strong> (server–server), porta <strong>587</strong> (client–server con autenticazione). SMTPS usa la porta 465." },
  { t:"Protocolli & Servizi", q:"Cos'è il protocollo FTP? Quale alternativa sicura esiste?", a:"<strong>FTP</strong> (porta 21): trasferimento file in chiaro, vulnerabile allo sniffing.<br><strong>SFTP</strong>: FTP cifrato via SSH (porta 22).<br><strong>FTPS</strong>: FTP con TLS (porta 990)." },
  { t:"Protocolli & Servizi", q:"Cos'è il three-way handshake TCP?", a:"Processo di apertura connessione TCP:<br>1. Client invia <strong>SYN</strong> (synchronize)<br>2. Server risponde <strong>SYN-ACK</strong><br>3. Client invia <strong>ACK</strong><br>La connessione è stabilita e lo scambio dati può iniziare." },

  // ── 8. VPN ──
  { t:"VPN", q:"Differenza tra VPN site-to-site e client-to-site?", a:"<strong>Site-to-site</strong>: tunnel permanente tra due router/firewall di sedi diverse. Trasparente per gli utenti.<br><strong>Client-to-site (remote access)</strong>: un singolo utente si connette alla rete aziendale da remoto tramite software VPN (es. da casa)." },
  { t:"VPN", q:"Cos'è IPsec?", a:"Suite di protocolli IETF per la sicurezza delle comunicazioni IP:<br>• <strong>AH</strong> (Authentication Header): integrità e autenticazione, NO cifratura<br>• <strong>ESP</strong> (Encapsulating Security Payload): integrità + <strong>cifratura</strong><br>• Modalità: <strong>tunnel</strong> (intero pacchetto cifrato) e <strong>transport</strong> (solo payload)" },
  { t:"VPN", q:"Differenza tra tunnel mode e transport mode in IPsec?", a:"<strong>Tunnel mode</strong>: l'intero pacchetto IP originale viene cifrato e incapsulato in un nuovo pacchetto IP. Usato per VPN site-to-site tra gateway.<br><strong>Transport mode</strong>: solo il payload è cifrato, l'header IP originale è visibile. Usato per comunicazioni host-to-host." },
  { t:"VPN", q:"Cos'è SSL/TLS e come protegge HTTPS?", a:"<strong>TLS</strong> (Transport Layer Security, evoluzione di SSL): protocollo crittografico che garantisce confidenzialità (cifratura simmetrica AES), integrità (HMAC) e autenticazione (certificato X.509) per HTTPS e altri protocolli." },
  { t:"VPN", q:"Cos'è OpenVPN?", a:"Soluzione VPN open source basata su <strong>SSL/TLS</strong>. Porta default: 1194 UDP (configurabile). Supporta multi-piattaforma, PKI con certificati X.509, e modalità tunnel e bridge." },
  { t:"VPN", q:"Cos'è IKE/IKEv2 in IPsec?", a:"<strong>Internet Key Exchange</strong>: protocollo per la negoziazione automatica dei parametri di sicurezza IPsec (SA — Security Association). Gestisce l'autenticazione e lo scambio di chiavi usando Diffie-Hellman." },

  // ── 9. SERVER & INFRASTRUTTURA ──
  { t:"Server & Infrastruttura", q:"Cos'è un load balancer?", a:"Dispositivo o software che <strong>distribuisce il traffico</strong> tra più server backend. Algoritmi: round-robin, least connections, IP hash. Garantisce alta disponibilità e scalabilità orizzontale. Può operare a L4 (TCP) o L7 (HTTP)." },
  { t:"Server & Infrastruttura", q:"Cos'è il RAID? Descrivi RAID 0, 1 e 5.", a:"Redundant Array of Independent Disks:<br><strong>RAID 0</strong>: striping, massima performance, nessuna ridondanza<br><strong>RAID 1</strong>: mirroring, copia esatta su 2 dischi, 50% efficienza<br><strong>RAID 5</strong>: striping con parità distribuita, tolleranza a 1 guasto, min 3 dischi" },
  { t:"Server & Infrastruttura", q:"Cos'è una DMZ e perché si usa?", a:"Sottorete separata dalla LAN interna e da internet tramite firewall. Ospita server accessibili dall'esterno (web, mail, DNS) proteggendo la rete interna: anche se un server DMZ viene compromesso, l'attaccante non accede direttamente alla LAN." },
  { t:"Server & Infrastruttura", q:"Differenza tra backup completo, incrementale e differenziale?", a:"<strong>Completo</strong>: copia tutti i dati ogni volta — lento ma ripristino veloce.<br><strong>Incrementale</strong>: copia solo i file modificati dall'ultimo backup (completo o incrementale) — veloce ma ripristino lento.<br><strong>Differenziale</strong>: copia i file modificati dall'ultimo backup completo — compromesso." },

  // ── 10. CLOUD & VIRTUALIZZAZIONE ──
  { t:"Cloud & Virtualizzazione", q:"Differenza tra IaaS, PaaS e SaaS?", a:"<strong>IaaS</strong> (Infrastructure as a Service): VM, storage, rete — es. AWS EC2, Azure VM. Controllo completo dell'OS.<br><strong>PaaS</strong> (Platform as a Service): ambiente di sviluppo gestito — es. Heroku, Google App Engine.<br><strong>SaaS</strong> (Software as a Service): app pronta all'uso — es. Gmail, Office 365, Salesforce." },
  { t:"Cloud & Virtualizzazione", q:"Differenza tra hypervisor tipo 1 e tipo 2?", a:"<strong>Tipo 1 (bare-metal)</strong>: gira direttamente sull'hardware fisico. Esempi: VMware ESXi, Microsoft Hyper-V, Xen, KVM. Performance superiore.<br><strong>Tipo 2 (hosted)</strong>: gira sopra un sistema operativo host. Esempi: VirtualBox, VMware Workstation. Più semplice ma meno efficiente." },
  { t:"Cloud & Virtualizzazione", q:"Cos'è il cloud ibrido?", a:"Combinazione di <strong>cloud privato</strong> (on-premise o data center dedicato) e <strong>cloud pubblico</strong>, con orchestrazione e portabilità dei dati tra i due. Bilancia costi, sicurezza e scalabilità." },
  { t:"Cloud & Virtualizzazione", q:"Pro e contro della migrazione al cloud rispetto all'on-premise?", a:"<strong>Pro cloud</strong>: costi OPEX (pay-as-you-go), scalabilità, nessuna gestione HW, DR integrato.<br><strong>Contro cloud</strong>: dipendenza dal provider (vendor lock-in), latenza, costi imprevedibili su larga scala, questioni di compliance e sovranità dei dati." },
  { t:"Cloud & Virtualizzazione", q:"Cos'è la containerizzazione (Docker)?", a:"Tecnologia che incapsula un'applicazione con le sue dipendenze in un <strong>container</strong> leggero e portabile. A differenza delle VM, i container condividono il kernel dell'OS host, consumando meno risorse." },
  { t:"Cloud & Virtualizzazione", q:"Cos'è il modello cloud pubblico, privato e ibrido?", a:"<strong>Pubblico</strong>: infrastruttura condivisa, gestita dal provider (AWS, Azure, GCP).<br><strong>Privato</strong>: infrastruttura dedicata a una sola organizzazione, on-premise o hosted.<br><strong>Ibrido</strong>: combinazione dei due, con integrazione tra ambienti." },

  // ── 11. IoT ──
  { t:"IoT", q:"Descrivi l'architettura IoT a tre livelli.", a:"1. <strong>Perception layer</strong> (Percezione): sensori, attuatori, dispositivi fisici<br>2. <strong>Network layer</strong> (Rete): gateway, protocolli (MQTT, CoAP, Zigbee, LoRa), connettività internet<br>3. <strong>Application layer</strong> (Applicazione): cloud, elaborazione dati, dashboard, logica applicativa" },
  { t:"IoT", q:"Cos'è MQTT?", a:"<strong>Message Queuing Telemetry Transport</strong>: protocollo publish/subscribe leggero per dispositivi IoT con banda o potenza limitata. Usa un <strong>broker</strong> (es. Mosquitto) come intermediario. I client si iscrivono a <strong>topic</strong> o vi pubblicano messaggi. Porta default: 1883 (8883 con TLS)." },
  { t:"IoT", q:"Quali sono le principali problematiche di sicurezza nell'IoT?", a:"• Dispositivi con risorse limitate → difficile implementare crittografia completa<br>• <strong>Password di default</strong> non cambiate<br>• Aggiornamenti firmware irregolari o impossibili<br>• Vasta superficie d'attacco (milioni di dispositivi)<br>• Protocolli legacy non sicuri" },
  { t:"IoT", q:"Differenza tra IoT e IIoT?", a:"<strong>IoT</strong> (Internet of Things): focus consumer — smart home, wearable, elettrodomestici connessi.<br><strong>IIoT</strong> (Industrial IoT): automazione industriale, sensori di processo, SCADA, manutenzione predittiva. Requisiti più stringenti di affidabilità e sicurezza." },
  { t:"IoT", q:"Cos'è LoRaWAN?", a:"Protocollo di rete wireless LPWAN (Low Power Wide Area Network) per IoT. Lunga portata (fino a 15 km), bassissimo consumo, bassa banda (0.3–50 kbps). Usato per contatori intelligenti, sensori ambientali, smart city." },

  // ── 12. SOCKET ──
  { t:"Socket", q:"Cos'è un socket?", a:"Endpoint di comunicazione identificato dalla coppia <strong>indirizzo IP + porta</strong>. Fornisce un'interfaccia API al layer di trasporto (TCP/UDP) per la comunicazione tra processi su reti IP." },
  { t:"Socket", q:"Sequenza di operazioni per un server TCP?", a:"<code>socket()</code> → crea il socket<br><code>bind()</code> → associa IP e porta<br><code>listen()</code> → mette in ascolto<br><code>accept()</code> → accetta una connessione (blocca)<br><code>recv()</code> / <code>send()</code> → scambio dati<br><code>close()</code> → chiude la connessione" },
  { t:"Socket", q:"Sequenza di operazioni per un client TCP?", a:"<code>socket()</code> → crea il socket<br><code>connect()</code> → si connette al server (IP + porta)<br><code>send()</code> / <code>recv()</code> → scambio dati<br><code>close()</code> → chiude la connessione" },
  { t:"Socket", q:"Differenza tra socket TCP (SOCK_STREAM) e UDP (SOCK_DGRAM)?", a:"<strong>SOCK_STREAM (TCP)</strong>: connesso, affidabile, stream di byte ordinato — richiede connect() prima di comunicare.<br><strong>SOCK_DGRAM (UDP)</strong>: non connesso, datagrammi indipendenti, no garanzie — usa sendto()/recvfrom() con indirizzo esplicito." },
  { t:"Socket", q:"Cos'è il concetto di porta well-known?", a:"Porte 0–1023 riservate a servizi noti: 22 SSH, 25 SMTP, 53 DNS, 80 HTTP, 110 POP3, 143 IMAP, 443 HTTPS, 3306 MySQL, ecc. Le porte 1024–49151 sono registered; 49152–65535 sono dinamiche/effimere." },

  // ── 13. FIBRA & RADIO ──
  { t:"Fibra & Radio", q:"Differenza tra fibra monomodale (SMF) e multimodale (MMF)?", a:"<strong>SMF (Single-Mode Fiber)</strong>: nucleo ~9 µm, un solo modo di propagazione, <strong>lunghezze fino a 100 km</strong>, attenuazione ~0.2 dB/km a 1550 nm. Più costosa.<br><strong>MMF (Multi-Mode Fiber)</strong>: nucleo 50/62.5 µm, multipli modi, max ~2 km, attenuazione maggiore. Meno costosa, usata in LAN." },
  { t:"Fibra & Radio", q:"Cos'è il link budget in un collegamento radio?", a:"Calcolo della potenza disponibile: <strong>P_TX(dBm) − perdite(dB) + guadagni antenne(dBi) ≥ sensibilità_RX(dBm) + margine</strong>.<br>Perdite: perdita di percorso (FSPL), ostacoli, connettori.<br>Guadagni: antenne direttive, amplificatori." },
  { t:"Fibra & Radio", q:"Formula della Free Space Path Loss (FSPL)?", a:"<strong>FSPL (dB) = 20·log₁₀(d) + 20·log₁₀(f) + 20·log₁₀(4π/c)</strong><br>≈ 20·log₁₀(d km) + 20·log₁₀(f MHz) + 32.4<br>Dove d = distanza, f = frequenza. Maggiore è la distanza o la frequenza, maggiore è l'attenuazione." },
  { t:"Fibra & Radio", q:"Vantaggi della fibra ottica rispetto al doppino in rame?", a:"• <strong>Immunità EMI</strong>: non risente di interferenze elettromagnetiche<br>• <strong>Sicurezza</strong>: non irradia segnale (difficile intercettare)<br>• <strong>Banda altissima</strong>: Tbps<br>• <strong>Distanze maggiori</strong>: km senza ripetitori<br>• Peso e dimensioni inferiori" },
  { t:"Fibra & Radio", q:"Cos'è la sensibilità di ricezione (RX sensitivity) di un access point?", a:"Il livello minimo di potenza del segnale ricevuto (in dBm) che permette all'access point di decodificare correttamente i dati. Esempio: −85 dBm. Se il segnale ricevuto è inferiore, la comunicazione fallisce." },

  // ── 14. PRIVACY & GDPR ──
  { t:"Privacy & GDPR", q:"Cos'è il GDPR?", a:"<strong>General Data Protection Regulation</strong> (Regolamento UE 2016/679): regolamento sulla protezione dei dati personali, in vigore dal <strong>25 maggio 2018</strong> in tutti gli stati UE. Sostituisce la Direttiva 95/46/CE. Prevede sanzioni fino a 4% del fatturato globale." },
  { t:"Privacy & GDPR", q:"Chi è il DPO (Data Protection Officer)?", a:"Il <strong>Responsabile della Protezione dei Dati</strong>. Obbligatorio per: Pubbliche Amministrazioni, organizzazioni che trattano dati sensibili su larga scala, o che monitorano regolarmente gli interessati. Supervisiona la conformità al GDPR, è indipendente e informa il titolare." },
  { t:"Privacy & GDPR", q:"Elenca i diritti dell'interessato secondo il GDPR.", a:"• <strong>Accesso</strong>: sapere quali dati si trattano<br>• <strong>Rettifica</strong>: correggere dati errati<br>• <strong>Cancellazione</strong>: diritto all'oblio<br>• <strong>Portabilità</strong>: ricevere i dati in formato leggibile<br>• <strong>Opposizione</strong>: opporsi al trattamento<br>• <strong>Limitazione</strong>: sospendere il trattamento" },
  { t:"Privacy & GDPR", q:"Cos'è un data breach e cosa prevede il GDPR?", a:"Violazione della sicurezza che porta a distruzione, perdita, alterazione o accesso non autorizzato a dati personali. Il titolare deve <strong>notificare il Garante entro 72 ore</strong> dalla scoperta; se il rischio è elevato, deve informare anche gli interessati." },
  { t:"Privacy & GDPR", q:"Differenza tra dato personale e categoria particolare di dati (dati sensibili)?", a:"<strong>Dato personale</strong>: qualsiasi informazione che identifica o rende identificabile una persona.<br><strong>Categorie particolari (art. 9)</strong>: dati sulla salute, origine razziale/etnica, convinzioni religiose/politiche, orientamento sessuale, dati genetici/biometrici — richiedono protezione rafforzata." },
  { t:"Privacy & GDPR", q:"Chi è il titolare del trattamento?", a:"La <strong>persona fisica o giuridica</strong> (azienda, PA) che determina le finalità e i mezzi del trattamento dei dati personali. È responsabile della conformità al GDPR e del rapporto con gli interessati." },
  { t:"Privacy & GDPR", q:"Cos'è il principio di privacy by design?", a:"Principio GDPR (art. 25) che richiede di <strong>integrare la protezione dei dati già nella fase di progettazione</strong> di sistemi e servizi, non come elemento aggiuntivo. Include minimizzazione dei dati, pseudonimizzazione, controllo degli accessi fin dall'inizio." },
];

// ── STATE ──
let deck = [];
let knownIds = new Set();
let idx = 0;
let flipped = false;
let onlyUnknown = false;

function buildDeck() {
  const filter = document.getElementById('topic-filter').value;
  const all = cards.map((c, i) => ({ ...c, id: i }));
  const filtered = filter === 'all' ? all : all.filter(c => c.t === filter);
  deck = onlyUnknown ? filtered.filter(c => !knownIds.has(c.id)) : filtered;
  idx = 0;
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function render() {
  const cardEl = document.getElementById('card');
  const cardWrap = document.getElementById('card-wrap');
  const navRow = document.querySelectorAll('.nav-row');
  const doneScreen = document.getElementById('done-screen');

  updateStats();

  if (deck.length === 0) {
    cardWrap.style.display = 'none';
    navRow.forEach(r => r.style.display = 'none');
    doneScreen.classList.add('visible');
    document.getElementById('done-sub').textContent = onlyUnknown
      ? 'Hai ripassato tutte le card rimanenti!'
      : 'Hai completato tutte le flashcards del mazzo.';
    renderDoneStats();
    return;
  }

  if (idx >= deck.length) {
    // Reached the end
    cardWrap.style.display = 'none';
    navRow.forEach(r => r.style.display = 'none');
    doneScreen.classList.add('visible');
    document.getElementById('done-sub').textContent = 'Hai completato tutte le flashcards del mazzo!';
    renderDoneStats();
    return;
  }

  cardWrap.style.display = '';
  navRow.forEach(r => r.style.display = 'flex');
  doneScreen.classList.remove('visible');

  // Reset flip
  flipped = false;
  cardEl.classList.remove('flipped');

  const c = deck[idx];
  document.getElementById('card-topic-tag').textContent = c.t;
  document.getElementById('card-q').textContent = c.q;
  document.getElementById('card-a').innerHTML = c.a;
  document.getElementById('card-counter').textContent = `${idx + 1} / ${deck.length}`;

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === deck.length - 1;

  // Progress
  const pct = deck.length ? Math.round((idx / deck.length) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${idx} / ${deck.length} viste`;

  // Know button state
  const knowBtn = document.getElementById('btn-know');
  if (knownIds.has(c.id)) {
    knowBtn.textContent = '✓ Già segnata come nota';
    knowBtn.style.opacity = '.5';
  } else {
    knowBtn.textContent = '✓ Già so';
    knowBtn.style.opacity = '1';
  }
}

function renderDoneStats() {
  const filter = document.getElementById('topic-filter').value;
  const total = filter === 'all' ? cards.length : cards.filter(c => c.t === filter).length;
  const known = [...knownIds].filter(id => filter === 'all' || cards[id].t === filter).length;
  document.getElementById('done-stats').innerHTML = `
    <div class="done-stat"><div class="ds-val">${total}</div><div class="ds-lbl">totale card</div></div>
    <div class="done-stat"><div class="ds-val" style="color:var(--green)">${known}</div><div class="ds-lbl">già so</div></div>
    <div class="done-stat"><div class="ds-val" style="color:var(--orange)">${total - known}</div><div class="ds-lbl">da ripassare</div></div>
  `;
}

function updateStats() {
  const filter = document.getElementById('topic-filter').value;
  const total = filter === 'all' ? cards.length : cards.filter(c => c.t === filter).length;
  const known = [...knownIds].filter(id => filter === 'all' || cards[id].t === filter).length;
  document.getElementById('stat-known').textContent = `✓ ${known} già so`;
  document.getElementById('stat-remaining').textContent = `${total - known} da ripassare`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function next() {
  if (idx < deck.length - 1) { idx++; render(); }
  else { idx = deck.length; render(); }
}

function prev() {
  if (idx > 0) { idx--; render(); }
}

function markKnown() {
  if (deck.length === 0 || idx >= deck.length) return;
  const c = deck[idx];
  knownIds.add(c.id);
  updateStats();
  // Auto advance
  if (idx < deck.length - 1) { idx++; render(); }
  else { idx = deck.length; render(); }
}

function resetDeck() {
  onlyUnknown = false;
  buildDeck();
}

document.getElementById('btn-shuffle').addEventListener('click', () => {
  shuffle(deck);
  idx = 0;
  render();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  knownIds.clear();
  onlyUnknown = false;
  buildDeck();
  updateStats();
});

document.getElementById('btn-only-unknown').addEventListener('click', () => {
  onlyUnknown = !onlyUnknown;
  const btn = document.getElementById('btn-only-unknown');
  btn.textContent = onlyUnknown ? '📋 Mostra tutte' : '🎯 Solo da ripassare';
  buildDeck();
});

document.getElementById('topic-filter').addEventListener('change', buildDeck);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
  if (e.key === 's' || e.key === 'S') { shuffle(deck); idx = 0; render(); }
  if (e.key === 'k' || e.key === 'K') markKnown();
});

// Init
buildDeck();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
